<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>AI Chat</title>
    <style>
        :root {
            --bg: #0a0a0f; --sb: #121217; --card: #1a1b23;
            --border: rgba(255,255,255,0.08); --text: #f1f1f3; --muted: #71717a;
            --acc: #7c3aed; --red: #ef4444; --green: #22c55e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; width:100%; overflow:hidden; position:fixed; top:0; left:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); }
        .app { display:flex; height:100vh; height:100dvh; }
        
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:49; }
        .overlay.on { display:block; }
        
        /* SIDEBAR */
        .sidebar { width:280px; min-width:280px; background:var(--sb); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100%; z-index:50; transition:transform .3s; }
        .sb-head { padding:16px; border-bottom:1px solid var(--border); }
        .sb-head h3 { font-size:16px; font-weight:700; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
        .btn-refresh { background:var(--acc); border:none; color:white; width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center; }
        .sb-head input { width:100%; padding:10px 12px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:13px; outline:none; }
        .sb-head input:focus { border-color:var(--acc); }
        #chatList { flex:1; overflow-y:auto; padding:6px; }
        
        .ai-item { display:flex; align-items:center; gap:10px; padding:12px; border-radius:12px; cursor:pointer; margin-bottom:1px; transition:background .15s; }
        .ai-item:active { background:rgba(255,255,255,0.05); }
        .ai-item.active { background:rgba(124,58,237,0.25); }
        .ai-av { width:42px;height:42px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden; }
        .ai-av img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
        .ai-inf { flex:1;min-width:0; }
        .ai-inf .n { font-weight:600;font-size:13px; }
        .ai-inf .d { font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .ai-badge { font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(239,68,68,0.2);color:#f87171;display:inline-block; }
        
        .sb-foot { padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
        .u-inf { display:flex;align-items:center;gap:8px; }
        .u-av { width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white; }
        .u-nm { font-weight:600;font-size:12px; }
        .u-rl { font-size:10px;color:var(--muted);text-transform:capitalize; }
        .btns { display:flex;gap:4px; }
        .btn-o { display:none;background:var(--acc);color:white;padding:5px 10px;border-radius:6px;text-decoration:none;font-size:10px;font-weight:600; }
        .btn-x { background:transparent;border:1px solid rgba(239,68,68,0.4);color:var(--red);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit; }
        
        /* MAIN */
        .main { flex:1;display:flex;flex-direction:column;height:100%;background:var(--bg); }
        .header { height:54px;min-height:54px;padding:0 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--sb); }
        .ham { display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 6px; }
        .h-inf { flex:1;min-width:0; }
        .h-nm { font-weight:600;font-size:15px; }
        .h-st { font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px; }
        .dot { width:6px;height:6px;border-radius:50%;background:var(--green); }
        
        .msgs { flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px; }
        .welcome { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:20px; }
        .welcome span { font-size:56px;margin-bottom:10px; }
        .welcome h2 { font-size:18px;color:var(--text);margin-bottom:4px; }
        .welcome p { font-size:13px; }
        
        .msg { max-width:85%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.4;word-wrap:break-word;animation:in .25s; }
        @keyframes in { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
        .msg.u { align-self:flex-end;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border-bottom-right-radius:4px; }
        .msg.a { align-self:flex-start;background:#1e1f2b;border:1px solid var(--border);border-bottom-left-radius:4px; }
        .typing { align-self:flex-start;padding:10px 14px;display:flex;gap:3px; }
        .typing span { width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay:.2s; }
        .typing span:nth-child(3) { animation-delay:.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.3;} 30%{transform:translateY(-6px);opacity:1;} }
        
        .limit { text-align:center;font-size:10px;color:var(--muted);padding:4px; }
        .inp-area { padding:10px 14px;border-top:1px solid var(--border);background:var(--sb); }
        .inp-wrap { display:flex;gap:8px;align-items:flex-end; }
        .inp-wrap textarea { flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;resize:none;outline:none;max-height:80px;font-family:inherit; }
        .inp-wrap textarea:focus { border-color:var(--acc); }
        .snd { width:38px;height:38px;border-radius:50%;background:var(--acc);border:none;color:white;font-size:16px;cursor:pointer;flex-shrink:0; }
        .snd:active { transform:scale(.95); }
        .snd:disabled { opacity:.4; }
        
        /* MODAL */
        .modal { position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100; }
        .modal.hidden { display:none; }
        .modal-b { background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:360px;text-align:center; }
        .modal-b h3 { margin-bottom:6px;font-size:16px; }
        .modal-b p { color:var(--muted);font-size:13px;margin-bottom:16px; }
        .modal-b button { padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;margin:3px;font-family:inherit; }
        .btn-p { background:var(--acc);color:white; }
        
        /* TOAST */
        .toast { position:fixed;bottom:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;color:white;font-weight:500;z-index:200;font-size:12px;animation:fadeUp .3s;pointer-events:none; }
        .toast.ok { background:var(--green); }
        .toast.err { background:var(--red); }
        .toast.inf { background:var(--acc); }
        @keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(8px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        
        .hidden { display:none !important; }
        
        @media (max-width:768px) {
            .sidebar { position:fixed;transform:translateX(-100%); }
            .sidebar.open { transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.5); }
            .ham { display:block; }
            .msg { max-width:92%; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <div class="app">
        <!-- SIDEBAR - AI CHARACTERS ONLY -->
        <aside class="sidebar" id="sidebar">
            <div class="sb-head">
                <h3>🤖 AI Characters <button class="btn-refresh" onclick="refreshAIs()" title="Refresh">↻</button></h3>
                <input type="text" id="searchInp" placeholder="Search AI..." oninput="filterAIs(this.value)">
            </div>
            <div id="chatList"><div style="text-align:center;color:var(--muted);padding:20px;">Loading...</div></div>
            <div class="sb-foot">
                <div class="u-inf">
                    <div class="u-av" id="uAv">U</div>
                    <div><div class="u-nm" id="uName">User</div><div class="u-rl" id="uRole">user</div></div>
                </div>
                <div class="btns">
                    <a href="/owner.html" class="btn-o" id="btnOwner">👑</a>
                    <button class="btn-x" onclick="logout()">Logout</button>
                </div>
            </div>
        </aside>
        
        <!-- MAIN CHAT -->
        <main class="main">
            <header class="header" id="chatHeader">
                <button class="ham" id="hamburgerBtn" onclick="openSidebar()">☰</button>
                <div class="h-inf">
                    <div class="h-nm" id="chatHeaderName">Select an AI</div>
                    <div class="h-st" id="chatHeaderStatus"><span class="dot"></span> <span>Online</span></div>
                </div>
                <div id="aiSource" style="font-size:11px;color:#71717a;background:#1a1b23;padding:6px 12px;border-radius:20px;display:none;"></div>
            </header>
            
            <div class="msgs" id="messagesContainer">
                <div class="welcome" id="welcomeScreen"><span>💬</span><h2>Select an AI Character</h2><p>Choose from the sidebar to start chatting</p></div>
            </div>
            
            <div class="limit" id="limitCounter">Messages: --/--</div>
            
            <div class="inp-area hidden" id="chatInputContainer">
                <div class="inp-wrap">
                    <textarea id="chatInput" placeholder="Type a message... (Enter to send)" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';"></textarea>
                    <button class="snd" id="sendBtn" onclick="sendMsg()">➤</button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- LIMIT MODAL -->
    <div class="modal hidden" id="limitModal">
        <div class="modal-b"><span style="font-size:40px;">✨</span><h3>Daily Limit Reached</h3><p>Come back tomorrow! 🌙</p><button class="btn-p" onclick="document.getElementById('limitModal').classList.add('hidden')">Got it</button></div>
    </div>

    <script>
        // ==================== API HELPER ====================
        const API = {
            async get(url) { const r = await fetch(url); if (!r.ok) throw new Error(await r.text()); return r.json(); },
            async post(url, body) { const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }); const d = await r.json(); if (!r.ok) throw new Error(d.error||'Error'); return d; }
        };
        
        // ==================== STATE ====================
        let user = null, ai = null, ais = [], chatId = null, busy = false;
        const LIMITS = { user:50, premium:200, owner:Infinity };
        
        // ==================== PERSISTENCE ====================
        function save() { try { localStorage.setItem('lc', JSON.stringify({cid:chatId, mid:ai?.id, t:Date.now()})); } catch(e) {} }
        function load() { try { const d = JSON.parse(localStorage.getItem('lc')); if (d && Date.now()-d.t < 864e5) return d; } catch(e) {} return null; }
        function clr() { try { localStorage.removeItem('lc'); } catch(e) {} }
        
        // ==================== SIDEBAR ====================
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('on');
            refreshAIs();
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('on');
        }
        
        // ==================== TOAST ====================
        function toast(m, t='inf') {
            const e = document.createElement('div'); e.className = 'toast ' + (t==='error'?'err':t==='success'?'ok':'inf');
            e.textContent = m; document.body.appendChild(e); setTimeout(() => e.remove(), 2500);
        }
        
        // ==================== INIT ====================
        (async () => {
            try {
                const d = await API.get('/api/auth/me');
                user = d.user;
                if (!user) { location.href = '/'; return; }
                
                document.getElementById('uAv').textContent = user.username[0].toUpperCase();
                document.getElementById('uName').textContent = user.username;
                document.getElementById('uRole').textContent = user.role;
                if (user.role === 'owner') document.getElementById('btnOwner').style.display = 'block';
                
                await refreshAIs();
                updLimit();
                
                // Restore last chat
                const last = load();
                if (last?.mid) {
                    const a = ais.find(x => x.id === last.mid);
                    if (a) { selectAI(a, last.cid); return; }
                }
                if (ais.length) selectAI(ais[0]);
            } catch(e) { location.href = '/'; }
        })();
        
        // Auto refresh AI list setiap 30 detik
        setInterval(refreshAIs, 30000);
        
        // ==================== AI LIST ====================
        async function refreshAIs() {
            try {
                const d = await API.get('/api/characters');
                ais = d.characters || [];
                console.log('✅ AI list refreshed:', ais.length, ais.map(c => c.name));
                renderSidebar();
            } catch(e) { console.error('Failed to load AIs:', e); }
        }
        
        function renderSidebar() {
            const el = document.getElementById('chatList');
            if (!el) { console.error('chatList not found!'); return; }
            
            if (!ais.length) {
                el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">No AI characters available</div>';
                return;
            }
            
            el.innerHTML = ais.map(a => {
                const av = a.avatar_url?.startsWith('http') 
                    ? `<img src="${a.avatar_url}" onerror="this.parentElement.textContent='🤖'" alt="">` 
                    : (a.avatar_url || '🤖');
                const active = a.id === ai?.id ? 'active' : '';
                return `
                <div class="ai-item ${active}" onclick="selectAIById('${a.id}')">
                    <div class="ai-av">${av}</div>
                    <div class="ai-inf">
                        <div class="n">${a.name}</div>
                        <div class="d">${a.description || a.status || 'Online'}</div>
                        ${a.visibility === 'private' ? '<span class="ai-badge">🔒 Private</span>' : ''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function filterAIs(query) {
            const filtered = query ? ais.filter(a => a.name.toLowerCase().includes(query.toLowerCase())) : ais;
            const el = document.getElementById('chatList');
            if (!filtered.length) {
                el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">No AI found</div>';
                return;
            }
            el.innerHTML = filtered.map(a => {
                const av = a.avatar_url?.startsWith('http') 
                    ? `<img src="${a.avatar_url}" onerror="this.parentElement.textContent='🤖'" alt="">` 
                    : (a.avatar_url || '🤖');
                return `
                <div class="ai-item ${a.id===ai?.id?'active':''}" onclick="selectAIById('${a.id}')">
                    <div class="ai-av">${av}</div>
                    <div class="ai-inf">
                        <div class="n">${a.name}</div>
                        <div class="d">${a.description || a.status || 'Online'}</div>
                        ${a.visibility==='private'?'<span class="ai-badge">🔒 Private</span>':''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function selectAIById(id) {
            const a = ais.find(x => x.id === id);
            if (a) { selectAI(a); closeSidebar(); }
        }
        
        // ==================== CHAT ====================
        async function selectAI(a, existingChatId) {
            ai = a;
            document.getElementById('chatHeaderName').textContent = a.name;
            document.getElementById('chatHeaderStatus').innerHTML = '<span class="dot"></span> <span>' + (a.status || 'Online') + '</span>';
            document.getElementById('chatInputContainer').classList.remove('hidden');
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            // Update sidebar active
            document.querySelectorAll('#chatList .ai-item').forEach(el => el.classList.remove('active'));
            const items = [...document.querySelectorAll('#chatList .ai-item')];
            const idx = ais.indexOf(a);
            if (idx >= 0 && items[idx]) items[idx].classList.add('active');
            
            try {
                const chats = (await API.get('/api/chats')).chats || [];
                const existing = existingChatId 
                    ? chats.find(c => c.id === existingChatId) 
                    : chats.find(c => c.character_id === a.id);
                
                if (existing) {
                    chatId = existing.id;
                    await loadMsgs();
                } else {
                    const d = await API.post('/api/chats', { character_id: a.id });
                    chatId = d.chat?.id;
                    document.getElementById('messagesContainer').innerHTML = '';
                }
            } catch(e) { console.error(e); }
            
            save();
            document.getElementById('chatInput').focus();
        }
        
        async function loadMsgs() {
            if (!chatId) return;
            try {
                const d = await API.get(`/api/chats/${chatId}/messages`);
                const el = document.getElementById('messagesContainer');
                el.innerHTML = '';
                (d.messages || []).forEach(m => addBubble(m.role, m.content, false));
                scrollBtm();
            } catch(e) {}
        }
        
        function addBubble(role, content, ani = true) {
            const d = document.createElement('div');
            d.className = 'msg ' + (role === 'user' ? 'u' : 'a');
            d.textContent = content;
            if (!ani) d.style.animation = 'none';
            document.getElementById('messagesContainer').appendChild(d);
            scrollBtm();
        }
        
        function scrollBtm() {
            const c = document.getElementById('messagesContainer');
            setTimeout(() => { c.scrollTop = c.scrollHeight; }, 50);
        }
        
        function showTyping() {
            const d = document.createElement('div'); d.className = 'typing'; d.id = 'typingIndicator';
            d.innerHTML = '<span></span><span></span><span></span>';
            document.getElementById('messagesContainer').appendChild(d);
            scrollBtm();
        }
        function hideTyping() { document.getElementById('typingIndicator')?.remove(); }
        
        // ==================== SEND ====================
        async function sendMsg() {
            if (busy || !chatId) return;
            const inp = document.getElementById('chatInput'), txt = inp.value.trim();
            if (!txt) return;
            
            const limit = LIMITS[user.role] || 50;
            if (limit !== Infinity && (user.daily_message_count || 0) >= limit) {
                document.getElementById('limitModal').classList.remove('hidden');
                return;
            }
            
            busy = true;
            document.getElementById('sendBtn').disabled = true;
            inp.value = ''; inp.style.height = 'auto';
            
            addBubble('user', txt);
            showTyping();
            
            try {
                const d = await API.post(`/api/chats/${chatId}/messages`, { content: txt });
                hideTyping();
                
                if (d.aiMessage) addBubble('assistant', d.aiMessage.content);
                if (d.aiSource) {
                    document.getElementById('aiSource').textContent = '🤖 ' + d.aiSource;
                    document.getElementById('aiSource').style.display = 'block';
                }
                if (d.remaining !== undefined) user.daily_message_count = limit - d.remaining;
                
                updLimit(); save();
            } catch(e) {
                hideTyping();
                if (e.message.includes('limit')) document.getElementById('limitModal').classList.remove('hidden');
                else toast(e.message, 'error');
            }
            
            busy = false;
            document.getElementById('sendBtn').disabled = false;
            inp.focus();
        }
        
        async function updLimit() {
            try {
                const d = await API.get('/api/user/stats');
                const el = document.getElementById('limitCounter');
                el.textContent = d.role === 'owner' ? 'Messages: Unlimited' : `Messages: ${d.remaining}/${d.dailyLimit}`;
            } catch(e) {}
        }
        
        async function logout() {
            clr();
            await API.post('/api/auth/logout', {});
            location.href = '/';
        }
    </script>
</body>
</html>
