<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- OPEN GRAPH -->
  <meta property="og:title" content="c.ai By MikuHost - AI Characters with Personality">
  <meta property="og:description" content="Modern AI Chat. Chat with Miku and other AI characters, switch moods, and build relationships. Free forever, supported by community.">
  <meta property="og:image" content="https://cdn.aceimg.com/27a9dbe8f.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://ca1-zeta.vercel.app">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="c.ai By MikuHost">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="c.ai By MikuHost">
  <meta name="twitter:description" content="Modern AI Chat with WhatsApp-style interface.">
  <meta name="twitter:image" content="https://cdn.aceimg.com/27a9dbe8f.jpg">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="c.ai By MikuHost - Free AI Chat with multiple characters, mood system, and personality. Powered by community support.">
  
  <title>c.ai By MikuHost - Free AI Chat</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-secondary: #a0a0a0;
      --accent: #6c5ce7;
      --accent-hover: #7c6cf7;
      --danger: #e74c3c;
      --success: #2ecc71;
      --input-bg: rgba(255, 255, 255, 0.08);
      --pink: #e91e63;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(ellipse at top left, rgba(108, 92, 231, 0.2), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(0, 206, 209, 0.15), transparent 50%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: var(--text);
    }

    .banner-top {
      width: 100%;
      max-width: 420px;
      margin-bottom: 14px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.2);
      border: 1px solid var(--glass-border);
    }
    .banner-top img { width: 100%; height: auto; display: block; aspect-ratio: 1200/630; }

    .container { width: 100%; max-width: 420px; }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .logo { text-align: center; margin-bottom: 20px; }
    .logo-icon {
      font-size: 42px; margin-bottom: 6px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .logo h1 {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #00cec9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

    .tabs {
      display: flex; gap: 4px; margin-bottom: 18px;
      background: var(--input-bg); border-radius: 12px; padding: 4px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; background: transparent;
      color: var(--text-secondary); border-radius: 10px; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: all 0.3s; font-family: inherit;
    }
    .tab-btn.active { background: var(--accent); color: white; }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; margin-bottom: 5px; color: var(--text-secondary);
      font-size: 12px; font-weight: 500;
    }
    .form-group input {
      width: 100%; padding: 11px 14px; background: var(--input-bg);
      border: 1px solid var(--glass-border); border-radius: 10px;
      color: var(--text); font-size: 14px; transition: all 0.3s;
      font-family: inherit; outline: none;
    }
    .form-group input:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
    }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white;
    }
    .btn-primary:active { transform: scale(0.98); }

    .error-msg { color: var(--danger); font-size: 12px; text-align: center; margin-top: 6px; min-height: 18px; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* SUPPORT SECTION */
    .support-section {
      margin-top: 14px;
      text-align: center;
      padding: 18px 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    .heart {
      font-size: 20px;
      animation: heartbeat 1.5s infinite;
      display: inline-block;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.3); }
      30% { transform: scale(1); }
      45% { transform: scale(1.2); }
      60% { transform: scale(1); }
    }
    .support-section h3 {
      font-size: 13px; margin: 5px 0 3px;
      background: linear-gradient(135deg, #e91e63, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .support-section p {
      font-size: 11px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.4;
    }
    .qris-wrapper {
      margin: 8px auto;
      max-width: 160px;
    }
    .qris-wrapper img {
      width: 100%;
      border-radius: 12px;
      border: 2px solid var(--glass-border);
      display: block;
    }
    .qris-placeholder {
      display: none;
      padding: 30px 20px;
      background: #121217;
      border-radius: 12px;
      border: 2px solid var(--glass-border);
      color: var(--text-secondary);
      font-size: 11px;
      text-align: center;
    }
    .qris-label {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .support-links {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .support-links a {
      font-size: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 10px;
      background: var(--input-bg);
      transition: all 0.2s;
    }
    .support-links a:hover { color: var(--text); background: rgba(255,255,255,0.12); }

    .footer-text { text-align: center; margin-top: 10px; color: var(--text-secondary); font-size: 10px; }

    .toast {
      position: fixed; top: 16px; right: 16px; padding: 12px 18px;
      border-radius: 10px; color: white; font-weight: 500; z-index: 9999;
      animation: slideIn 0.3s ease; font-family: inherit; font-size: 13px;
      max-width: 280px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.info { background: var(--accent); }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .banner-bottom { display: none; }

    @media (max-width: 480px) {
      .card { padding: 22px 16px; border-radius: 20px; }
      .logo h1 { font-size: 20px; }
      .qris-wrapper { max-width: 140px; }
    }
    @media (max-height: 700px) {
      .banner-top { display: none; }
      .banner-bottom {
        display: block;
        width: 100%;
        max-width: 420px;
        margin-top: 14px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(108, 92, 231, 0.2);
        border: 1px solid var(--glass-border);
      }
      .banner-bottom img { width: 100%; height: auto; display: block; aspect-ratio: 1200/630; }
    }
  </style>
</head>
<body>
  <!-- BANNER ATAS -->
  <div class="banner-top">
    <img src="https://cdn.aceimg.com/27a9dbe8f.jpg" alt="c.ai By MikuHost" loading="eager">
  </div>

  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">💬</div>
        <h1>C.AI</h1>
        <p>By MikuHost</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <div id="login-panel" class="form-panel active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group"><label>Username</label><input type="text" id="login-username" placeholder="Enter username" required minlength="3"></div>
          <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="Enter password" required minlength="6"></div>
          <button type="submit" class="btn btn-primary">Login</button>
          <div class="error-msg" id="login-error"></div>
        </form>
      </div>

      <div id="register-panel" class="form-panel">
        <form onsubmit="handleRegister(event)">
          <div class="form-group"><label>Username</label><input type="text" id="reg-username" placeholder="Choose username" required minlength="3"></div>
          <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="Create password" required minlength="6"></div>
          <div class="form-group"><label>Confirm Password</label><input type="password" id="reg-confirm" placeholder="Confirm password" required minlength="6"></div>
          <button type="submit" class="btn btn-primary">Register</button>
          <div class="error-msg" id="reg-error"></div>
        </form>
      </div>
    </div>

    <!-- SUPPORT SECTION -->
    <div class="support-section">
      <div class="heart">❤️</div>
      <h3>Support This Project</h3>
      <p>Website ini GRATIS. API key & server butuh biaya bulanan. Scan QRIS untuk bantu kami tetap hidup! 💜</p>
      
      <div class="qris-wrapper">
        <img src="https://files.catbox.moe/placeholder.png" 
             alt="QRIS All Pay" 
             id="qrisImage"
             onerror="this.style.display='none';document.getElementById('qrisFallback').style.display='block';">
        <div id="qrisFallback" class="qris-placeholder">
          📷 Scan QRIS<br>Coming Soon
        </div>
      </div>
      <p class="qris-label">Scan QRIS • All Payment • Nominal Bebas</p>
      
      <div class="support-links">
        <a href="https://github.com/miku208" target="_blank"> GitHub</a>
        <a href="/chat">Chat</a>
        <a href="/owner">Owner</a>
      </div>
    </div>

    <div class="footer-text">MikuHost</div>
  </div>

  <!-- BANNER BAWAH -->
  <div class="banner-bottom">
    <img src="https://cdn.aceimg.com/27a9dbe8f.jpg" alt="c.ai By MikuHost" loading="lazy">
  </div>

  <script>
    var currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      var btns = document.querySelectorAll('.tab-btn');
      var panels = document.querySelectorAll('.form-panel');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      for (var j = 0; j < panels.length; j++) panels[j].classList.remove('active');
      if (tab === 'login') {
        btns[0].classList.add('active');
        document.getElementById('login-panel').classList.add('active');
        document.getElementById('login-error').textContent = '';
      } else {
        btns[1].classList.add('active');
        document.getElementById('register-panel').classList.add('active');
        document.getElementById('reg-error').textContent = '';
      }
    }

    function showToast(message, type) {
      type = type || 'info';
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(function() { if (toast.parentNode) toast.remove(); }, 300);
      }, 3000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      var username = document.getElementById('login-username').value.trim();
      var password = document.getElementById('login-password').value;
      var errorEl = document.getElementById('login-error');
      errorEl.textContent = '';
      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (data.error) { errorEl.textContent = data.error; showToast(data.error, 'error'); return; }
        showToast('Login successful!', 'success');
        setTimeout(function() {
          window.location.href = data.user && data.user.role === 'owner' ? '/owner' : '/chat';
        }, 400);
      } catch(err) { errorEl.textContent = 'Connection error'; showToast('Connection error', 'error'); }
    }

    async function handleRegister(e) {
      e.preventDefault();
      var username = document.getElementById('reg-username').value.trim();
      var password = document.getElementById('reg-password').value;
      var confirm = document.getElementById('reg-confirm').value;
      var errorEl = document.getElementById('reg-error');
      errorEl.textContent = '';
      if (password !== confirm) { errorEl.textContent = 'Passwords do not match'; return; }
      if (username.length < 3) { errorEl.textContent = 'Username min 3 chars'; return; }
      if (password.length < 6) { errorEl.textContent = 'Password min 6 chars'; return; }
      try {
        var res = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (data.error) { errorEl.textContent = data.error; showToast(data.error, 'error'); return; }
        showToast('Registration successful!', 'success');
        setTimeout(function() { window.location.href = '/chat'; }, 400);
      } catch(err) { errorEl.textContent = 'Connection error'; showToast('Connection error', 'error'); }
    }

    // Load QRIS dari API
    (async function loadQris() {
      try {
        var r = await fetch('/api/settings');
        var d = await r.json();
        if (d.settings && d.settings.qris_url) {
          var img = document.getElementById('qrisImage');
          img.src = d.settings.qris_url;
          img.style.display = 'block';
          document.getElementById('qrisFallback').style.display = 'none';
        }
      } catch(e) {}
    })();

    // Auto-redirect kalau udah login
    (async function() {
      try {
        var res = await fetch('/api/auth/me');
        var data = await res.json();
        if (data.user) {
          window.location.href = data.user.role === 'owner' ? '/owner' : '/chat';
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
